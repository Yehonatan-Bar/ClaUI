<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Discworld - Death in Reaper Man</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #020208;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  /* Deep night sky */
  .sky {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%, rgba(8,12,40,0.9) 0%, transparent 70%),
      radial-gradient(ellipse 80% 50% at 30% 20%, rgba(15,8,35,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 75% 30%, rgba(5,10,30,0.5) 0%, transparent 55%);
  }

  /* Stars layer */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--o1); transform: scale(1); }
    to   { opacity: var(--o2); transform: scale(var(--s)); }
  }

  /* Great A'Tuin aurora — faint cosmic glow */
  .aurora {
    position: fixed;
    width: 100%;
    height: 60%;
    top: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 40% 25% at 25% 30%, rgba(60,80,180,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 35% 20% at 70% 25%, rgba(120,50,160,0.06) 0%, transparent 70%);
    animation: auroraShift 12s ease-in-out infinite alternate;
  }
  @keyframes auroraShift {
    from { opacity: 0.5; }
    to   { opacity: 1; }
  }

  /* Falling sand from the Lifetimer */
  .sand-layer { position: fixed; inset: 0; pointer-events: none; z-index: 3; }
  .grain {
    position: absolute;
    background: rgba(200,180,120,0.5);
    border-radius: 50%;
    animation: sandfall var(--d) linear infinite;
    opacity: 0;
  }
  @keyframes sandfall {
    0%   { transform: translateY(-8px) translateX(0); opacity: 0; }
    5%   { opacity: 0.6; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(105vh) translateX(var(--dx)); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 20;
    max-width: 740px;
    text-align: center;
    padding: 64px 60px;
    border: 1px solid rgba(100,120,200,0.2);
    background: rgba(4, 4, 16, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 2px;
    box-shadow:
      0 0 80px rgba(60,70,160,0.15),
      0 0 160px rgba(40,30,100,0.08),
      inset 0 0 60px rgba(0,0,0,0.7);
    animation: surface 2.8s ease forwards;
    opacity: 0;
  }
  @keyframes surface {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Corner ornaments — bone white */
  .cn { position: absolute; width: 36px; height: 36px; }
  .cn.tl { top:-1px; left:-1px; }
  .cn.tr { top:-1px; right:-1px; transform: scaleX(-1); }
  .cn.bl { bottom:-1px; left:-1px; transform: scaleY(-1); }
  .cn.br { bottom:-1px; right:-1px; transform: scale(-1,-1); }

  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 7px;
    color: rgba(140,150,200,0.45);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .sep {
    display: flex; align-items: center; gap: 14px;
    margin: 0 auto 30px; width: fit-content;
  }
  .sep-l { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, rgba(140,150,210,0.4)); }
  .sep-r { width: 80px; height: 1px; background: linear-gradient(90deg, rgba(140,150,210,0.4), transparent); }

  /* Death speaks in small caps — his voice has NO QUOTES in the books */
  .death-voice {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2.5px;
    line-height: 1.7;
    color: rgba(220,225,255,0.92);
    text-transform: uppercase;
    margin-bottom: 18px;
    text-shadow:
      0 0 30px rgba(140,160,255,0.4),
      0 0 60px rgba(100,110,200,0.2),
      0 2px 6px rgba(0,0,0,0.9);
    animation: deathGlow 3.5s ease-in-out infinite alternate;
  }
  @keyframes deathGlow {
    from { text-shadow: 0 0 20px rgba(140,160,255,0.3), 0 0 50px rgba(100,110,200,0.15); }
    to   { text-shadow: 0 0 40px rgba(160,180,255,0.6), 0 0 80px rgba(120,130,220,0.35); }
  }

  .context-line {
    font-size: 20px;
    font-style: italic;
    color: rgba(170,175,210,0.55);
    margin-bottom: 38px;
    line-height: 1.7;
    text-shadow: 0 0 18px rgba(80,90,160,0.25);
  }

  .thin-sep {
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(140,150,210,0.35), transparent);
    margin: 0 auto 24px;
  }

  .attribution {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: rgba(140,150,200,0.4);
    letter-spacing: 3px;
    line-height: 2;
  }

  /* Hourglass SVG glow */
  .hourglass-container {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 2;
    opacity: 0.12;
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="aurora"></div>
<div class="stars" id="starField"></div>

<!-- Wheat field silhouette landscape -->
<svg style="position:fixed;bottom:0;left:0;right:0;height:260px;pointer-events:none;z-index:1;"
     viewBox="0 0 1440 260" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="groundG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a18" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#020208" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="moonG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(200,210,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(150,160,220,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Moon glow -->
  <circle cx="1200" cy="30" r="60" fill="url(#moonG)"/>
  <circle cx="1200" cy="30" r="22" fill="rgba(210,220,255,0.12)"/>

  <!-- Rolling hills -->
  <path d="M0 260 L0 180 Q200 140 400 165 Q600 195 800 155 Q1000 120 1200 150 Q1350 170 1440 160 L1440 260 Z" fill="url(#groundG)"/>

  <!-- Wheat stalks silhouettes -->
  <g stroke="rgba(80,75,50,0.35)" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M50 180 Q52 160 48 138"><animate attributeName="d" values="M50 180 Q52 160 48 138;M50 180 Q54 158 50 136;M50 180 Q52 160 48 138" dur="4s" repeatCount="indefinite"/></path>
    <path d="M120 175 Q122 150 118 128"><animate attributeName="d" values="M120 175 Q122 150 118 128;M120 175 Q125 148 121 126;M120 175 Q122 150 118 128" dur="4.5s" repeatCount="indefinite"/></path>
    <path d="M200 170 Q203 148 198 125"><animate attributeName="d" values="M200 170 Q203 148 198 125;M200 170 Q206 146 201 123;M200 170 Q203 148 198 125" dur="3.8s" repeatCount="indefinite"/></path>
    <path d="M310 168 Q313 145 308 120"><animate attributeName="d" values="M310 168 Q313 145 308 120;M310 168 Q316 143 311 118;M310 168 Q313 145 308 120" dur="4.2s" repeatCount="indefinite"/></path>
    <path d="M450 162 Q452 138 448 112"><animate attributeName="d" values="M450 162 Q452 138 448 112;M450 162 Q455 136 451 110;M450 162 Q452 138 448 112" dur="3.5s" repeatCount="indefinite"/></path>
    <path d="M580 170 Q583 148 578 125"><animate attributeName="d" values="M580 170 Q583 148 578 125;M580 170 Q586 146 581 123;M580 170 Q583 148 578 125" dur="4.8s" repeatCount="indefinite"/></path>
    <path d="M700 158 Q703 135 698 110"><animate attributeName="d" values="M700 158 Q703 135 698 110;M700 158 Q706 133 701 108;M700 158 Q703 135 698 110" dur="3.9s" repeatCount="indefinite"/></path>
    <path d="M830 155 Q832 130 828 105"><animate attributeName="d" values="M830 155 Q832 130 828 105;M830 155 Q835 128 831 103;M830 155 Q832 130 828 105" dur="4.3s" repeatCount="indefinite"/></path>
    <path d="M960 152 Q963 128 958 102"><animate attributeName="d" values="M960 152 Q963 128 958 102;M960 152 Q966 126 961 100;M960 152 Q963 128 958 102" dur="3.7s" repeatCount="indefinite"/></path>
    <path d="M1100 155 Q1103 132 1098 108"><animate attributeName="d" values="M1100 155 Q1103 132 1098 108;M1100 155 Q1106 130 1101 106;M1100 155 Q1103 132 1098 108" dur="4.1s" repeatCount="indefinite"/></path>
    <path d="M1250 158 Q1253 135 1248 110"><animate attributeName="d" values="M1250 158 Q1253 135 1248 110;M1250 158 Q1256 133 1251 108;M1250 158 Q1253 135 1248 110" dur="4.6s" repeatCount="indefinite"/></path>
    <path d="M1380 162 Q1383 140 1378 118"><animate attributeName="d" values="M1380 162 Q1383 140 1378 118;M1380 162 Q1386 138 1381 116;M1380 162 Q1383 140 1378 118" dur="3.6s" repeatCount="indefinite"/></path>
  </g>

  <!-- Death's silhouette — tall robed figure with scythe, standing in wheat -->
  <g transform="translate(720,70)" opacity="0.18">
    <!-- Robe body -->
    <path d="M-18 190 L-12 60 Q-10 30 0 10 Q10 30 12 60 L18 190 Q0 195 -18 190Z" fill="#fff"/>
    <!-- Hood -->
    <ellipse cx="0" cy="18" rx="14" ry="16" fill="#fff"/>
    <ellipse cx="0" cy="16" rx="9" ry="10" fill="#020208"/>
    <!-- Scythe handle -->
    <line x1="20" y1="175" x2="35" y2="-30" stroke="#fff" stroke-width="2.5"/>
    <!-- Scythe blade -->
    <path d="M35 -30 Q60 -25 55 0 Q48 -8 35 -20Z" fill="#fff"/>
  </g>
</svg>

<!-- Lifetimer hourglass -->
<div class="hourglass-container">
  <svg width="80" height="140" viewBox="0 0 80 140" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="glassG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(180,190,255,0.3)"/>
        <stop offset="50%" stop-color="rgba(140,150,220,0.15)"/>
        <stop offset="100%" stop-color="rgba(180,190,255,0.3)"/>
      </linearGradient>
    </defs>
    <!-- Top frame -->
    <rect x="12" y="6" width="56" height="6" rx="2" fill="rgba(200,180,120,0.4)"/>
    <!-- Bottom frame -->
    <rect x="12" y="128" width="56" height="6" rx="2" fill="rgba(200,180,120,0.4)"/>
    <!-- Glass outline -->
    <path d="M18 12 Q18 55 40 70 Q62 55 62 12" fill="none" stroke="url(#glassG)" stroke-width="1.5"/>
    <path d="M18 128 Q18 85 40 70 Q62 85 62 128" fill="none" stroke="url(#glassG)" stroke-width="1.5"/>
    <!-- Sand top -->
    <path d="M22 16 Q22 48 40 62 Q58 48 58 16 Z" fill="rgba(200,180,120,0.08)"/>
    <!-- Sand bottom -->
    <path d="M28 128 Q28 100 40 78 Q52 100 52 128 Z" fill="rgba(200,180,120,0.12)"/>
    <!-- Sand stream -->
    <line x1="40" y1="62" x2="40" y2="78" stroke="rgba(200,180,120,0.25)" stroke-width="1">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="2s" repeatCount="indefinite"/>
    </line>
  </svg>
</div>

<div class="sand-layer" id="sandLayer"></div>

<div class="card">
  <div class="cn tl"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(140,150,210,0.5)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(140,150,210,0.4)"/>
  </svg></div>
  <div class="cn tr"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(140,150,210,0.5)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(140,150,210,0.4)"/>
  </svg></div>
  <div class="cn bl"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(140,150,210,0.5)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(140,150,210,0.4)"/>
  </svg></div>
  <div class="cn br"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(140,150,210,0.5)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(140,150,210,0.4)"/>
  </svg></div>

  <p class="eyebrow">Discworld &mdash; Reaper Man</p>

  <div class="sep">
    <div class="sep-l"></div>
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <!-- Tiny hourglass icon -->
      <rect x="3" y="1" width="12" height="2" rx="0.5" fill="rgba(200,180,120,0.6)"/>
      <rect x="3" y="15" width="12" height="2" rx="0.5" fill="rgba(200,180,120,0.6)"/>
      <path d="M5 3 Q5 8 9 9 Q13 8 13 3" fill="none" stroke="rgba(200,180,120,0.5)" stroke-width="1"/>
      <path d="M5 15 Q5 10 9 9 Q13 10 13 15" fill="none" stroke="rgba(200,180,120,0.5)" stroke-width="1"/>
    </svg>
    <div class="sep-r"></div>
  </div>

  <p class="death-voice">
    What can the harvest hope for,<br>
    if not for the care<br>
    of the Reaper Man?
  </p>

  <p class="context-line">
    Lord, what can the harvest hope for,<br>
    if not for the care of the Reaper Man?
  </p>

  <div class="thin-sep"></div>
  <p class="attribution">Death<br>Terry Pratchett &mdash; Reaper Man</p>
</div>

<script>
  // Generate stars
  const starField = document.getElementById('starField');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    const o1 = (Math.random() * 0.4 + 0.2).toFixed(2);
    const o2 = (Math.random() * 0.5 + 0.5).toFixed(2);
    const scale = (Math.random() * 0.5 + 1).toFixed(2);
    star.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      top:${Math.random() * 65}%;
      --o1:${o1}; --o2:${o2}; --s:${scale};
      --d:${(Math.random() * 4 + 2).toFixed(1)}s;
      animation-delay:${(Math.random() * 5).toFixed(1)}s;
    `;
    starField.appendChild(star);
  }

  // Generate falling sand grains
  const sandLayer = document.getElementById('sandLayer');
  for (let i = 0; i < 40; i++) {
    const grain = document.createElement('div');
    grain.className = 'grain';
    const size = Math.random() * 2 + 1;
    const dx = (Math.random() * 40 - 20).toFixed(0) + 'px';
    grain.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      top:-6px;
      --d:${(Math.random() * 14 + 8).toFixed(1)}s;
      --dx:${dx};
      animation-delay:${(Math.random() * 15).toFixed(1)}s;
    `;
    sandLayer.appendChild(grain);
  }
</script>
</body>
</html>
