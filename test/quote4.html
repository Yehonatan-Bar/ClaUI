<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Silmarillion Quote - The Doom of Mandos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #06060f;
    overflow: hidden;
    font-family: 'Crimson Text', serif;
  }

  /* Starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) infinite ease-in-out alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.08; transform: scale(1); }
    to   { opacity: 0.9;  transform: scale(1.5); }
  }

  /* Silmaril-like radiant orb */
  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(200,170,80,0.12) 0%,
      rgba(120,80,200,0.08) 40%,
      transparent 70%
    );
    top: 50%; left: 50%;
    transform: translate(-50%, -52%);
    animation: pulse 8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -52%) scale(1);   opacity: 0.6; }
    50%       { transform: translate(-50%, -52%) scale(1.3); opacity: 1;   }
  }

  /* Distant mountains at bottom */
  .mountain-layer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 300px;
    pointer-events: none;
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    max-width: 700px;
    text-align: center;
    padding: 68px 60px;
    border: 1px solid rgba(200,170,80,0.2);
    background: rgba(6, 6, 18, 0.80);
    backdrop-filter: blur(14px);
    border-radius: 4px;
    box-shadow:
      0 0 80px rgba(120,80,200,0.12),
      0 0 40px rgba(200,170,80,0.08),
      inset 0 0 50px rgba(0,0,0,0.6);
    animation: fadeIn 2.5s ease forwards;
    opacity: 0;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .corner {
    position: absolute;
    width: 28px; height: 28px;
    border-color: rgba(200,170,80,0.45);
    border-style: solid;
  }
  .corner.tl { top: -1px; left: -1px;   border-width: 2px 0 0 2px; }
  .corner.tr { top: -1px; right: -1px;  border-width: 2px 2px 0 0; }
  .corner.bl { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .subtitle {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 10px;
    letter-spacing: 6px;
    color: rgba(200,170,80,0.55);
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,170,80,0.45), transparent);
    margin: 0 auto 36px;
  }

  blockquote {
    font-size: 26px;
    line-height: 1.8;
    color: #ddd4b8;
    font-style: italic;
    letter-spacing: 0.3px;
    margin-bottom: 36px;
    text-shadow: 0 2px 24px rgba(200,170,80,0.15);
  }

  blockquote .highlight {
    color: #c8a840;
    font-style: normal;
  }

  .divider2 {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,170,80,0.35), transparent);
    margin: 0 auto 24px;
  }

  .attribution {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 11px;
    color: rgba(200,170,80,0.45);
    letter-spacing: 3px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow"></div>

<!-- Mountains of the West -->
<svg class="mountain-layer" viewBox="0 0 1440 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="peakGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c8a840" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0820" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <!-- back range -->
  <path d="M0 300 L0 220 Q200 140 360 160 Q520 180 640 100 Q760 20  880 80 Q1000 140 1120 120 Q1240 100 1440 180 L1440 300 Z"
        fill="rgba(15,10,35,0.7)"/>
  <!-- front range -->
  <path d="M0 300 L0 260 Q180 200 320 220 Q460 240 560 170 Q660 100 760 150 Q860 200 960 180 Q1080 160 1200 200 Q1320 230 1440 210 L1440 300 Z"
        fill="rgba(10,8,25,0.9)"/>
  <!-- sky overlay -->
  <rect width="1440" height="300" fill="url(#skyGrad)"/>
  <!-- faint light on highest peak -->
  <ellipse cx="760" cy="148" rx="60" ry="18" fill="rgba(200,168,64,0.10)"/>
</svg>

<div class="card">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <p class="subtitle">The Silmarillion &mdash; Of the Flight of the Noldor</p>
  <div class="divider"></div>

  <blockquote>
    <span class="highlight">Tears unnumbered</span> ye shall shed;<br>
    and the Valar will fence Valinor against you,<br>
    and shut you out,<br>
    so that not even<br>
    <span class="highlight">the echo of your lamentation</span><br>
    shall pass over the mountains.
  </blockquote>

  <div class="divider2"></div>
  <p class="attribution">The Doom of Mandos<br>The Silmarillion</p>
</div>

<script>
  // Generate stars — denser and slightly bluer for a primordial sky
  const container = document.getElementById('stars');
  for (let i = 0; i < 220; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.2 + 0.4;
    const hue = Math.random() < 0.15 ? 'rgba(180,160,255,0.9)' : '#ffffff';
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      background:${hue};
      --d:${(Math.random()*5+2).toFixed(1)}s;
      animation-delay:${(Math.random()*6).toFixed(1)}s;
    `;
    container.appendChild(s);
  }
</script>
</body>
</html>
