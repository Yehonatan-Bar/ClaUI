<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOTR - Aragorn at the Black Gate</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0c0504;
    overflow: hidden;
    font-family: 'Lora', serif;
  }

  /* Mordor sky — blood-red glow low on horizon */
  .sky {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 120% 40% at 50% 100%, rgba(160,25,0,0.55) 0%, transparent 55%),
      radial-gradient(ellipse 60% 30% at 20% 80%,  rgba(80,10,0,0.3)   0%, transparent 50%),
      radial-gradient(ellipse 60% 30% at 80% 70%,  rgba(100,18,0,0.25) 0%, transparent 50%);
  }

  /* Orodruin pulsing glow */
  .orodruin-glow {
    position: fixed;
    width: 320px; height: 260px;
    bottom: 80px;
    right: 22%;
    background: radial-gradient(ellipse, rgba(200,50,0,0.3) 0%, transparent 65%);
    pointer-events: none;
    animation: orodruin 5s ease-in-out infinite alternate;
  }
  @keyframes orodruin {
    from { opacity: 0.4; transform: scaleY(1); }
    to   { opacity: 0.9; transform: scaleY(1.15); }
  }

  /* Falling ash */
  .ash-layer { position: fixed; inset: 0; pointer-events: none; z-index: 3; }
  .ash {
    position: absolute;
    background: rgba(170,145,115,0.38);
    animation: ashfall var(--d) linear infinite;
    opacity: 0;
  }
  @keyframes ashfall {
    0%   { transform: translateY(-10px) translateX(0) rotate(0deg); opacity: 0; }
    8%   { opacity: 0.55; }
    88%  { opacity: 0.22; }
    100% { transform: translateY(105vh) translateX(var(--dx)) rotate(var(--r)); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 20;
    max-width: 720px;
    text-align: center;
    padding: 62px 58px;
    border: 1px solid rgba(180,55,15,0.32);
    background: rgba(8, 3, 2, 0.82);
    backdrop-filter: blur(10px);
    border-radius: 2px;
    box-shadow:
      0 0 70px rgba(190,55,5,0.22),
      0 0 140px rgba(130,25,0,0.12),
      inset 0 0 60px rgba(0,0,0,0.7);
    animation: surface 2.5s ease forwards;
    opacity: 0;
  }
  @keyframes surface {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Corner ornaments */
  .cn { position: absolute; width: 36px; height: 36px; }
  .cn.tl { top:-1px; left:-1px; }
  .cn.tr { top:-1px; right:-1px; transform: scaleX(-1); }
  .cn.bl { bottom:-1px; left:-1px; transform: scaleY(-1); }
  .cn.br { bottom:-1px; right:-1px; transform: scale(-1,-1); }

  .eyebrow {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 9px;
    letter-spacing: 7px;
    color: rgba(195,75,25,0.52);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .sep {
    display: flex; align-items: center; gap: 14px;
    margin: 0 auto 30px; width: fit-content;
  }
  .sep-l { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, rgba(190,65,20,0.5)); }
  .sep-r { width: 80px; height: 1px; background: linear-gradient(90deg, rgba(190,65,20,0.5), transparent); }

  .lead-quote {
    font-size: 24px;
    line-height: 1.82;
    color: rgba(225,198,158,0.8);
    font-style: italic;
    margin-bottom: 20px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }

  .battle-cry {
    font-size: 38px;
    font-weight: 600;
    font-style: italic;
    color: #f0a035;
    letter-spacing: 0.5px;
    line-height: 1.25;
    margin-bottom: 14px;
    text-shadow:
      0 0 30px rgba(255,120,0,0.65),
      0 0 60px rgba(200,55,0,0.35),
      0 2px 6px rgba(0,0,0,0.9);
    animation: ignite 2.2s ease-in-out infinite alternate;
  }
  @keyframes ignite {
    from { text-shadow: 0 0 20px rgba(255,110,0,0.5), 0 0 50px rgba(200,50,0,0.25); }
    to   { text-shadow: 0 0 45px rgba(255,150,0,0.9), 0 0 90px rgba(220,70,0,0.5); }
  }

  .sub-line {
    font-size: 22px;
    font-style: italic;
    color: rgba(220,155,60,0.72);
    margin-bottom: 38px;
    text-shadow: 0 0 20px rgba(200,80,0,0.35);
  }

  .thin-sep {
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(190,65,20,0.4), transparent);
    margin: 0 auto 24px;
  }

  .attribution {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 10px;
    color: rgba(190,90,35,0.45);
    letter-spacing: 3px;
    line-height: 2;
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="orodruin-glow"></div>

<!-- Black Gate & Mordor landscape -->
<svg style="position:fixed;bottom:0;left:0;right:0;height:300px;pointer-events:none;"
     viewBox="0 0 1440 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="groundG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#160804" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="lavaG" cx="68%" cy="100%" r="35%">
      <stop offset="0%" stop-color="#ff3000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gateG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c0a03"/>
      <stop offset="100%" stop-color="#060101"/>
    </linearGradient>
  </defs>

  <!-- Ground plane -->
  <rect x="0" y="200" width="1440" height="100" fill="url(#groundG)"/>
  <!-- Orodruin volcanic glow beneath mountain -->
  <ellipse cx="960" cy="300" rx="380" ry="160" fill="url(#lavaG)"/>

  <!-- Ash Mountains — left range -->
  <path d="M0 300 L0 200 L90 150 L170 190 L260 120 L340 165 L410 185 L450 300 Z" fill="#100604"/>
  <!-- Ash Mountains — right range -->
  <path d="M990 300 L1040 210 L1110 175 L1180 200 L1260 145 L1330 178 L1440 200 L1440 300 Z" fill="#100604"/>

  <!-- Mount Doom (Orodruin) — right-center -->
  <path d="M870 300 L940 128 L970 148 L1000 118 L1040 300 Z" fill="#1a0700"/>
  <!-- Lava streak on Orodruin -->
  <path d="M940 134 Q956 172 961 228 Q963 258 959 300"
        stroke="rgba(230,70,0,0.45)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Black Gate — left tower -->
  <rect x="508" y="95" width="88" height="215" fill="url(#gateG)"/>
  <rect x="504" y="81" width="22" height="18" rx="1" fill="#120601"/>
  <rect x="532" y="81" width="22" height="18" rx="1" fill="#120601"/>
  <rect x="560" y="81" width="22" height="18" rx="1" fill="#120601"/>
  <rect x="588" y="81" width="18" height="18" rx="1" fill="#120601"/>

  <!-- Black Gate — right tower -->
  <rect x="844" y="95" width="88" height="215" fill="url(#gateG)"/>
  <rect x="840" y="81" width="22" height="18" rx="1" fill="#120601"/>
  <rect x="868" y="81" width="22" height="18" rx="1" fill="#120601"/>
  <rect x="896" y="81" width="22" height="18" rx="1" fill="#120601"/>
  <rect x="924" y="81" width="18" height="18" rx="1" fill="#120601"/>

  <!-- Gate doors (closed, arched) -->
  <path d="M596 300 L596 130 Q720 116 844 130 L844 300 Z" fill="#0c0301"/>
  <line x1="720" y1="118" x2="720" y2="300" stroke="rgba(80,25,5,0.35)" stroke-width="2.5"/>
  <!-- Rivets -->
  <g fill="rgba(70,25,5,0.55)">
    <circle cx="646" cy="175" r="4.5"/><circle cx="694" cy="175" r="4.5"/>
    <circle cx="646" cy="220" r="4.5"/><circle cx="694" cy="220" r="4.5"/>
    <circle cx="646" cy="265" r="4.5"/><circle cx="694" cy="265" r="4.5"/>
    <circle cx="748" cy="175" r="4.5"/><circle cx="796" cy="175" r="4.5"/>
    <circle cx="748" cy="220" r="4.5"/><circle cx="796" cy="220" r="4.5"/>
    <circle cx="748" cy="265" r="4.5"/><circle cx="796" cy="265" r="4.5"/>
  </g>

  <!-- Eye of Sauron — faint glow above gate -->
  <ellipse cx="720" cy="70" rx="55" ry="18" fill="rgba(200,70,0,0.18)"/>
  <ellipse cx="720" cy="70" rx="12" ry="18" fill="rgba(210,55,0,0.45)"/>
  <ellipse cx="720" cy="70" rx="4"  ry="10" fill="rgba(240,90,0,0.65)"/>

  <!-- Army of Men — tiny silhouettes at base -->
  <g fill="rgba(25,12,4,0.95)">
    <rect x="370" y="281" width="5" height="14"/><rect x="386" y="279" width="5" height="16"/>
    <rect x="402" y="282" width="5" height="13"/><rect x="418" y="280" width="5" height="15"/>
    <rect x="434" y="281" width="5" height="14"/><rect x="450" y="279" width="5" height="16"/>
    <rect x="466" y="282" width="5" height="13"/><rect x="482" y="281" width="5" height="14"/>
    <rect x="498" y="279" width="5" height="16"/>
    <!-- spears -->
    <rect x="372" y="268" width="2" height="16" fill="rgba(60,30,10,0.55)"/>
    <rect x="404" y="266" width="2" height="18" fill="rgba(60,30,10,0.55)"/>
    <rect x="436" y="268" width="2" height="16" fill="rgba(60,30,10,0.55)"/>
    <rect x="468" y="267" width="2" height="17" fill="rgba(60,30,10,0.55)"/>
    <!-- far-right soldiers -->
    <rect x="958" y="281" width="5" height="14"/><rect x="974" y="279" width="5" height="16"/>
    <rect x="990" y="282" width="5" height="13"/><rect x="1006" y="280" width="5" height="15"/>
    <rect x="1022" y="281" width="5" height="14"/>
  </g>
</svg>

<div class="ash-layer" id="ashLayer"></div>

<div class="card">
  <div class="cn tl"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(190,65,20,0.6)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(190,65,20,0.5)"/>
  </svg></div>
  <div class="cn tr"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(190,65,20,0.6)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(190,65,20,0.5)"/>
  </svg></div>
  <div class="cn bl"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(190,65,20,0.6)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(190,65,20,0.5)"/>
  </svg></div>
  <div class="cn br"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(190,65,20,0.6)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(190,65,20,0.5)"/>
  </svg></div>

  <p class="eyebrow">The Lord of the Rings &mdash; The Return of the King</p>

  <div class="sep">
    <div class="sep-l"></div>
    <svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
      <polygon points="8,0 10,6 16,6 11,10 13,16 8,12 3,16 5,10 0,6 6,6" fill="rgba(190,65,20,0.65)"/>
    </svg>
    <div class="sep-r"></div>
  </div>

  <p class="lead-quote">
    A day may come when the courage of men fails,<br>
    when we forsake our friends<br>
    and break all bonds of fellowship.
  </p>

  <p class="battle-cry">"But it is not this day."</p>

  <p class="sub-line">This day we fight!</p>

  <div class="thin-sep"></div>
  <p class="attribution">Aragorn son of Arathorn<br>Before the Black Gate of Mordor</p>
</div>

<script>
  const layer = document.getElementById('ashLayer');
  for (let i = 0; i < 65; i++) {
    const el = document.createElement('div');
    el.className = 'ash';
    const w = Math.random() * 5 + 1;
    const h = Math.random() * 3 + 1;
    const dx = (Math.random() * 100 - 50).toFixed(0) + 'px';
    const rot = (Math.random() * 360).toFixed(0) + 'deg';
    el.style.cssText = `
      width:${w}px; height:${h}px;
      border-radius:${Math.random() > 0.4 ? '2px' : '50%'};
      left:${Math.random() * 100}%;
      top:-8px;
      --d:${(Math.random() * 10 + 7).toFixed(1)}s;
      --dx:${dx};
      --r:${rot};
      animation-delay:${(Math.random() * 12).toFixed(1)}s;
    `;
    layer.appendChild(el);
  }
</script>
</body>
</html>
