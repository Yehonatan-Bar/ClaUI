<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Discworld - Death in Reaper Man</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050510;
    overflow: hidden;
    font-family: 'Crimson Text', serif;
  }

  /* Deep midnight sky with faint aurora */
  .sky {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 30% 20%, rgba(20,30,80,0.4) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 70% 15%, rgba(40,15,60,0.35) 0%, transparent 55%),
      radial-gradient(ellipse 100% 30% at 50% 100%, rgba(8,12,30,0.9) 0%, transparent 50%);
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--t) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--o1); }
    to   { opacity: var(--o2); }
  }

  /* Hourglass sand particles falling */
  .sand-layer { position: fixed; inset: 0; pointer-events: none; z-index: 3; }
  .sand {
    position: absolute;
    background: rgba(200,180,120,0.5);
    border-radius: 50%;
    animation: sandfall var(--d) linear infinite;
    opacity: 0;
  }
  @keyframes sandfall {
    0%   { transform: translateY(-6px) translateX(0); opacity: 0; }
    5%   { opacity: 0.6; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(105vh) translateX(var(--dx)); opacity: 0; }
  }

  /* Blue glow — Death's domain */
  .death-glow {
    position: fixed;
    width: 500px; height: 500px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, rgba(60,80,180,0.12) 0%, transparent 65%);
    pointer-events: none;
    animation: pulse-glow 6s ease-in-out infinite alternate;
  }
  @keyframes pulse-glow {
    from { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
    to   { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 20;
    max-width: 740px;
    text-align: center;
    padding: 64px 60px;
    border: 1px solid rgba(100,120,200,0.2);
    background: rgba(5, 5, 18, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 2px;
    box-shadow:
      0 0 80px rgba(60,80,180,0.15),
      0 0 160px rgba(30,40,100,0.08),
      inset 0 0 60px rgba(0,0,0,0.7);
    animation: surface 2.8s ease forwards;
    opacity: 0;
  }
  @keyframes surface {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Corner ornaments */
  .cn { position: absolute; width: 36px; height: 36px; }
  .cn.tl { top:-1px; left:-1px; }
  .cn.tr { top:-1px; right:-1px; transform: scaleX(-1); }
  .cn.bl { bottom:-1px; left:-1px; transform: scaleY(-1); }
  .cn.br { bottom:-1px; right:-1px; transform: scale(-1,-1); }

  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 7px;
    color: rgba(120,140,210,0.5);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .sep {
    display: flex; align-items: center; gap: 14px;
    margin: 0 auto 30px; width: fit-content;
  }
  .sep-l { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, rgba(100,120,200,0.45)); }
  .sep-r { width: 80px; height: 1px; background: linear-gradient(90deg, rgba(100,120,200,0.45), transparent); }

  /* Death speaks in SMALL CAPS — Pratchett tradition */
  .death-voice {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 600;
    line-height: 1.75;
    color: rgba(180,195,240,0.92);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
    text-shadow:
      0 0 30px rgba(100,130,255,0.4),
      0 0 60px rgba(60,80,200,0.2),
      0 2px 6px rgba(0,0,0,0.9);
    animation: voice-glow 3s ease-in-out infinite alternate;
  }
  @keyframes voice-glow {
    from { text-shadow: 0 0 20px rgba(100,130,255,0.3), 0 0 50px rgba(60,80,200,0.15); }
    to   { text-shadow: 0 0 40px rgba(120,150,255,0.6), 0 0 80px rgba(80,100,220,0.35); }
  }

  .context-line {
    font-size: 19px;
    font-style: italic;
    color: rgba(160,170,210,0.6);
    margin-bottom: 38px;
    line-height: 1.7;
  }

  .thin-sep {
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100,120,200,0.35), transparent);
    margin: 0 auto 24px;
  }

  .attribution {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: rgba(120,140,210,0.4);
    letter-spacing: 3px;
    line-height: 2;
  }

  /* Hourglass icon between separator lines */
  .hourglass-icon {
    opacity: 0.55;
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="death-glow"></div>

<!-- Wheat field landscape — Death was a harvester -->
<svg style="position:fixed;bottom:0;left:0;right:0;height:280px;pointer-events:none;z-index:1;"
     viewBox="0 0 1440 280" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fieldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a18" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#030308" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="moonG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d4f0"/>
      <stop offset="100%" stop-color="#8090c0"/>
    </linearGradient>
  </defs>

  <!-- Ground -->
  <path d="M0 200 Q200 175 400 190 Q600 210 800 185 Q1000 170 1200 195 Q1350 205 1440 190 L1440 280 L0 280 Z"
        fill="url(#fieldG)"/>

  <!-- Wheat stalks — silhouettes swaying in moonlight -->
  <g stroke="rgba(140,130,80,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M60 280 Q58 240 65 200"><animate attributeName="d" values="M60 280 Q58 240 65 200;M60 280 Q62 240 58 200;M60 280 Q58 240 65 200" dur="4s" repeatCount="indefinite"/></path>
    <path d="M120 280 Q118 235 125 190"><animate attributeName="d" values="M120 280 Q118 235 125 190;M120 280 Q122 235 118 190;M120 280 Q118 235 125 190" dur="3.5s" repeatCount="indefinite"/></path>
    <path d="M200 280 Q198 242 205 198"><animate attributeName="d" values="M200 280 Q198 242 205 198;M200 280 Q202 242 198 198;M200 280 Q198 242 205 198" dur="4.2s" repeatCount="indefinite"/></path>
    <path d="M290 280 Q288 238 295 195"><animate attributeName="d" values="M290 280 Q288 238 295 195;M290 280 Q292 238 288 195;M290 280 Q288 238 295 195" dur="3.8s" repeatCount="indefinite"/></path>
    <path d="M380 280 Q378 245 385 205"><animate attributeName="d" values="M380 280 Q378 245 385 205;M380 280 Q382 245 378 205;M380 280 Q378 245 385 205" dur="4.5s" repeatCount="indefinite"/></path>
    <path d="M460 280 Q458 240 465 195"><animate attributeName="d" values="M460 280 Q458 240 465 195;M460 280 Q462 240 458 195;M460 280 Q458 240 465 195" dur="3.6s" repeatCount="indefinite"/></path>
    <path d="M540 280 Q538 242 545 200"><animate attributeName="d" values="M540 280 Q538 242 545 200;M540 280 Q542 242 538 200;M540 280 Q538 242 545 200" dur="4.1s" repeatCount="indefinite"/></path>
    <path d="M630 280 Q628 236 635 192"><animate attributeName="d" values="M630 280 Q628 236 635 192;M630 280 Q632 236 628 192;M630 280 Q628 236 635 192" dur="3.9s" repeatCount="indefinite"/></path>
    <path d="M720 280 Q718 244 725 202"><animate attributeName="d" values="M720 280 Q718 244 725 202;M720 280 Q722 244 718 202;M720 280 Q718 244 725 202" dur="4.3s" repeatCount="indefinite"/></path>
    <path d="M810 280 Q808 238 815 195"><animate attributeName="d" values="M810 280 Q808 238 815 195;M810 280 Q812 238 808 195;M810 280 Q808 238 815 195" dur="3.7s" repeatCount="indefinite"/></path>
    <path d="M900 280 Q898 242 905 198"><animate attributeName="d" values="M900 280 Q898 242 905 198;M900 280 Q902 242 898 198;M900 280 Q898 242 905 198" dur="4.4s" repeatCount="indefinite"/></path>
    <path d="M980 280 Q978 240 985 200"><animate attributeName="d" values="M980 280 Q978 240 985 200;M980 280 Q982 240 978 200;M980 280 Q978 240 985 200" dur="3.4s" repeatCount="indefinite"/></path>
    <path d="M1060 280 Q1058 236 1065 192"><animate attributeName="d" values="M1060 280 Q1058 236 1065 192;M1060 280 Q1062 236 1058 192;M1060 280 Q1058 236 1065 192" dur="4.6s" repeatCount="indefinite"/></path>
    <path d="M1140 280 Q1138 242 1145 200"><animate attributeName="d" values="M1140 280 Q1138 242 1145 200;M1140 280 Q1142 242 1138 200;M1140 280 Q1138 242 1145 200" dur="3.3s" repeatCount="indefinite"/></path>
    <path d="M1240 280 Q1238 238 1245 195"><animate attributeName="d" values="M1240 280 Q1238 238 1245 195;M1240 280 Q1242 238 1238 195;M1240 280 Q1238 238 1245 195" dur="4.0s" repeatCount="indefinite"/></path>
    <path d="M1360 280 Q1358 244 1365 202"><animate attributeName="d" values="M1360 280 Q1358 244 1365 202;M1360 280 Q1362 244 1358 202;M1360 280 Q1358 244 1365 202" dur="3.9s" repeatCount="indefinite"/></path>
  </g>

  <!-- Death's scythe — silhouette on the right -->
  <g transform="translate(1220, 140)" opacity="0.35">
    <!-- Handle -->
    <line x1="50" y1="0" x2="20" y2="140" stroke="#8090c0" stroke-width="3" stroke-linecap="round"/>
    <!-- Blade -->
    <path d="M50 0 Q80 -10 100 10 Q110 25 95 30 Q60 18 50 0 Z" fill="#8090c0" opacity="0.7"/>
  </g>

  <!-- Moon -->
  <circle cx="180" cy="60" r="28" fill="url(#moonG)" opacity="0.25"/>
  <circle cx="188" cy="56" r="26" fill="#050510" opacity="0.8"/>
</svg>

<div class="stars" id="starLayer"></div>
<div class="sand-layer" id="sandLayer"></div>

<div class="card">
  <div class="cn tl"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(100,120,200,0.5)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(100,120,200,0.45)"/>
  </svg></div>
  <div class="cn tr"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(100,120,200,0.5)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(100,120,200,0.45)"/>
  </svg></div>
  <div class="cn bl"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(100,120,200,0.5)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(100,120,200,0.45)"/>
  </svg></div>
  <div class="cn br"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 L2 24 M2 2 L24 2" stroke="rgba(100,120,200,0.5)" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="2.5" fill="rgba(100,120,200,0.45)"/>
  </svg></div>

  <p class="eyebrow">Discworld &mdash; Reaper Man</p>

  <div class="sep">
    <div class="sep-l"></div>
    <svg class="hourglass-icon" width="18" height="22" viewBox="0 0 18 22" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 1 L15 1 L15 3 Q15 9 9 11 Q3 9 3 3 Z" stroke="rgba(100,120,200,0.6)" stroke-width="1" fill="rgba(100,120,200,0.1)"/>
      <path d="M3 21 L15 21 L15 19 Q15 13 9 11 Q3 13 3 19 Z" stroke="rgba(100,120,200,0.6)" stroke-width="1" fill="rgba(100,120,200,0.1)"/>
      <!-- Sand in bottom -->
      <path d="M5 21 L13 21 L13 19 Q13 15 9 13 Q5 15 5 19 Z" fill="rgba(200,180,120,0.2)"/>
    </svg>
    <div class="sep-r"></div>
  </div>

  <p class="death-voice">
    What can the harvest hope for,<br>
    if not for the care<br>
    of the Reaper Man?
  </p>

  <p class="context-line">
    Lord, what can the harvest hope for,<br>
    if not for the care of the Reaper Man?
  </p>

  <div class="thin-sep"></div>
  <p class="attribution">Death<br>Terry Pratchett &mdash; Reaper Man</p>
</div>

<script>
  // Generate stars
  const starLayer = document.getElementById('starLayer');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    const o1 = (Math.random() * 0.3 + 0.1).toFixed(2);
    const o2 = (Math.random() * 0.5 + 0.4).toFixed(2);
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      top:${Math.random() * 60}%;
      --t:${(Math.random() * 4 + 2).toFixed(1)}s;
      --o1:${o1};
      --o2:${o2};
      animation-delay:${(Math.random() * 5).toFixed(1)}s;
    `;
    starLayer.appendChild(s);
  }

  // Generate falling sand (hourglass motif)
  const sandLayer = document.getElementById('sandLayer');
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'sand';
    const w = Math.random() * 2 + 1;
    const dx = (Math.random() * 30 - 15).toFixed(0) + 'px';
    el.style.cssText = `
      width:${w}px; height:${w}px;
      left:${Math.random() * 100}%;
      top:-6px;
      --d:${(Math.random() * 14 + 8).toFixed(1)}s;
      --dx:${dx};
      animation-delay:${(Math.random() * 15).toFixed(1)}s;
    `;
    sandLayer.appendChild(el);
  }
</script>
</body>
</html>
