<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOTR Quote - Gandalf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #08060a;
    overflow: hidden;
    font-family: 'Lora', serif;
  }

  /* Deep smoke / fog layer */
  .fog {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 80% 40% at 50% 90%, rgba(60,20,10,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 20% 60%, rgba(40,10,5,0.3) 0%, transparent 60%),
      radial-gradient(ellipse 60% 30% at 80% 40%, rgba(50,15,5,0.3) 0%, transparent 60%);
  }

  /* Flame embers */
  .ember-layer { position: fixed; inset: 0; pointer-events: none; }
  .ember {
    position: absolute;
    border-radius: 50%;
    animation: rise var(--d) ease-in infinite;
    opacity: 0;
  }
  @keyframes rise {
    0%   { transform: translateY(0)    translateX(0)     scale(1);   opacity: 0; }
    15%  { opacity: 1; }
    70%  { opacity: 0.8; }
    100% { transform: translateY(-180px) translateX(var(--drift)) scale(0.3); opacity: 0; }
  }

  /* Bridge of Khazad-dum bottom scene */
  .bridge-scene {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 280px;
    pointer-events: none;
  }

  /* Radiant glow behind card */
  .radiance {
    position: fixed;
    width: 600px; height: 400px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, rgba(255,80,10,0.12) 0%, transparent 65%);
    animation: flicker 0.14s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes flicker {
    from { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    to   { opacity: 1;   transform: translate(-50%, -50%) scale(1.04); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 20;
    max-width: 700px;
    text-align: center;
    padding: 62px 58px;
    border: 1px solid rgba(220,100,30,0.3);
    background: rgba(8, 5, 3, 0.82);
    backdrop-filter: blur(8px);
    border-radius: 3px;
    box-shadow:
      0 0 60px rgba(220,80,10,0.2),
      0 0 120px rgba(160,40,0,0.12),
      inset 0 0 50px rgba(0,0,0,0.7);
    animation: materialise 2s ease forwards;
    opacity: 0;
  }
  @keyframes materialise {
    from { opacity: 0; filter: brightness(3); }
    to   { opacity: 1; filter: brightness(1); }
  }

  /* Flame border corners */
  .fc {
    position: absolute;
    width: 40px; height: 40px;
  }
  .fc.tl { top: -1px;    left: -1px;   }
  .fc.tr { top: -1px;    right: -1px;  transform: scaleX(-1); }
  .fc.bl { bottom: -1px; left: -1px;   transform: scaleY(-1); }
  .fc.br { bottom: -1px; right: -1px;  transform: scale(-1,-1); }

  .eyebrow {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 9px;
    letter-spacing: 6px;
    color: rgba(220,120,40,0.55);
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .flame-sep {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 0 auto 30px;
    width: fit-content;
  }
  .flame-sep .line {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(220,100,30,0.5));
  }
  .flame-sep .line.r {
    background: linear-gradient(90deg, rgba(220,100,30,0.5), transparent);
  }

  .main-quote {
    font-size: 42px;
    font-weight: 600;
    font-style: italic;
    color: #f8c060;
    letter-spacing: 1px;
    line-height: 1.3;
    margin-bottom: 32px;
    text-shadow:
      0 0 30px rgba(255,120,0,0.6),
      0 0 60px rgba(255,60,0,0.3),
      0 2px 4px rgba(0,0,0,0.8);
    animation: glow-text 2s ease-in-out infinite alternate;
  }
  @keyframes glow-text {
    from { text-shadow: 0 0 20px rgba(255,120,0,0.5), 0 0 50px rgba(255,60,0,0.2); }
    to   { text-shadow: 0 0 40px rgba(255,140,0,0.8), 0 0 80px rgba(255,80,0,0.4); }
  }

  .sub-quote {
    font-size: 16px;
    line-height: 1.8;
    color: rgba(230,190,120,0.7);
    font-style: italic;
    margin-bottom: 36px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .thin-sep {
    width: 50px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(220,100,30,0.4), transparent);
    margin: 0 auto 24px;
  }

  .attribution {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 10px;
    color: rgba(220,120,40,0.45);
    letter-spacing: 3px;
    line-height: 2;
  }
</style>
</head>
<body>

<div class="fog"></div>
<div class="radiance"></div>

<!-- Bridge of Khazad-dum scene -->
<svg class="bridge-scene" viewBox="0 0 1440 280" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lavaGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%"   stop-color="#ff4000" stop-opacity="0.7"/>
      <stop offset="40%"  stop-color="#aa1500" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a04"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  <!-- Lava glow from pit -->
  <ellipse cx="720" cy="280" rx="700" ry="200" fill="url(#lavaGlow)"/>
  <!-- Chasm walls left -->
  <path d="M0 280 L0 120 Q100 160 180 140 Q240 125 260 150 L280 280 Z" fill="url(#rockGrad)"/>
  <!-- Chasm walls right -->
  <path d="M1440 280 L1440 100 Q1340 145 1260 130 Q1200 118 1180 145 L1160 280 Z" fill="url(#rockGrad)"/>
  <!-- Narrow bridge -->
  <path d="M280 165 Q500 170 720 162 Q940 154 1160 160"
        stroke="rgba(30,20,10,0.9)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M280 165 Q500 170 720 162 Q940 154 1160 160"
        stroke="rgba(60,30,10,0.6)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Bridge top edge highlight -->
  <path d="M280 156 Q500 161 720 153 Q940 145 1160 151"
        stroke="rgba(120,60,20,0.4)" stroke-width="2" fill="none"/>
  <!-- Lava surface at bottom -->
  <path d="M240 280 Q360 240 480 260 Q600 280 720 250 Q840 220 960 248 Q1080 275 1200 255 L1200 280 Z"
        fill="rgba(200,60,0,0.35)"/>
  <path d="M240 280 Q400 260 560 272 Q720 283 880 265 Q1040 248 1200 268 L1200 280 Z"
        fill="rgba(255,100,0,0.2)"/>
</svg>

<div class="ember-layer" id="embers"></div>

<div class="card">
  <!-- Flame corner ornaments -->
  <div class="fc tl">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2 L2 20 M2 2 L20 2" stroke="rgba(220,100,30,0.55)" stroke-width="1.5" fill="none"/>
    </svg>
  </div>
  <div class="fc tr">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2 L2 20 M2 2 L20 2" stroke="rgba(220,100,30,0.55)" stroke-width="1.5" fill="none"/>
    </svg>
  </div>
  <div class="fc bl">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2 L2 20 M2 2 L20 2" stroke="rgba(220,100,30,0.55)" stroke-width="1.5" fill="none"/>
    </svg>
  </div>
  <div class="fc br">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2 L2 20 M2 2 L20 2" stroke="rgba(220,100,30,0.55)" stroke-width="1.5" fill="none"/>
    </svg>
  </div>

  <p class="eyebrow">Silco &mdash; Arcane, Season 1</p>

  <div class="flame-sep">
    <div class="line"></div>
    <svg width="14" height="18" viewBox="0 0 14 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M7 18 C3 14 0 10 2 6 C4 2 6 4 7 2 C8 4 10 2 12 6 C14 10 11 14 7 18 Z"
            fill="rgba(220,100,30,0.7)"/>
      <path d="M7 16 C5 13 3.5 10 5 7.5 C6 5.5 6.5 7 7 5.5 C7.5 7 8 5.5 9 7.5 C10.5 10 9 13 7 16 Z"
            fill="rgba(255,180,60,0.6)"/>
    </svg>
    <div class="line r"></div>
  </div>

  <p class="main-quote">"You've already failed."</p>

  <p class="sub-quote">
    The question is: what will you do about it?<br>
    The world will not stop for your grief.<br>
    It never does.
  </p>

  <div class="thin-sep"></div>
  <p class="attribution">Silco<br>Arcane</p>
</div>

<script>
  const layer = document.getElementById('embers');
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'ember';
    const size = Math.random() * 4 + 1;
    const hue = Math.random() > 0.5 ? 'rgba(255,140,30,0.9)' : 'rgba(255,60,10,0.8)';
    const drift = (Math.random() * 80 - 40).toFixed(0) + 'px';
    el.style.cssText = `
      width:${size}px; height:${size}px;
      background:${hue};
      left:${20+Math.random()*60}%;
      bottom:${Math.random()*20}%;
      box-shadow: 0 0 ${size*2}px ${hue};
      --d:${(Math.random()*5+3).toFixed(1)}s;
      --drift:${drift};
      animation-delay:${(Math.random()*8).toFixed(1)}s;
    `;
    layer.appendChild(el);
  }
</script>
</body>
</html>
