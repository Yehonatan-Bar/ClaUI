<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOTR Quote - The Wanderer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Crimson Text', serif;
  }

  /* Starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) infinite ease-in-out alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(1); }
    to   { opacity: 1;   transform: scale(1.4); }
  }

  /* Winding road SVG at bottom */
  .road-layer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 260px;
    pointer-events: none;
  }

  /* Misty glow orb */
  .glow {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(60,120,80,0.18) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    animation: pulse 6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -55%) scale(1);   opacity: 0.7; }
    50%       { transform: translate(-50%, -55%) scale(1.2); opacity: 1;   }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    max-width: 680px;
    text-align: center;
    padding: 64px 56px;
    border: 1px solid rgba(180,160,80,0.25);
    background: rgba(8, 12, 8, 0.75);
    backdrop-filter: blur(12px);
    border-radius: 4px;
    box-shadow:
      0 0 60px rgba(60,120,60,0.15),
      inset 0 0 40px rgba(0,0,0,0.5);
    animation: fadeIn 2s ease forwards;
    opacity: 0;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .corner {
    position: absolute;
    width: 28px; height: 28px;
    border-color: rgba(180,160,80,0.5);
    border-style: solid;
  }
  .corner.tl { top: -1px; left: -1px;   border-width: 2px 0 0 2px; }
  .corner.tr { top: -1px; right: -1px;  border-width: 2px 2px 0 0; }
  .corner.bl { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .subtitle {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 10px;
    letter-spacing: 6px;
    color: rgba(180,160,80,0.6);
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,160,80,0.5), transparent);
    margin: 0 auto 36px;
  }

  blockquote {
    font-size: 28px;
    line-height: 1.7;
    color: #e8dfc0;
    font-style: italic;
    letter-spacing: 0.3px;
    margin-bottom: 36px;
    text-shadow: 0 2px 20px rgba(180,160,80,0.2);
  }

  blockquote .highlight {
    color: #c8b060;
    font-style: normal;
  }

  .divider2 {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,160,80,0.4), transparent);
    margin: 0 auto 24px;
  }

  .attribution {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 11px;
    color: rgba(180,160,80,0.5);
    letter-spacing: 3px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow"></div>

<!-- Winding road -->
<svg class="road-layer" viewBox="0 0 1440 260" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a2a1a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- ground fill -->
  <path d="M0 260 Q360 180 720 200 Q1080 220 1440 160 L1440 260 Z" fill="url(#roadGrad)"/>
  <!-- road path -->
  <path d="M-50 260 Q200 210 400 230 Q600 250 720 210 Q840 170 1100 190 Q1300 205 1490 160"
        stroke="rgba(60,50,20,0.6)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- road center line -->
  <path d="M-50 260 Q200 210 400 230 Q600 250 720 210 Q840 170 1100 190 Q1300 205 1490 160"
        stroke="rgba(180,160,80,0.15)" stroke-width="2" fill="none" stroke-dasharray="24 16" stroke-linecap="round"/>
  <!-- trees (simple triangles) -->
  <g fill="rgba(20,50,20,0.7)">
    <polygon points="80,220 100,170 120,220"/>
    <polygon points="110,220 128,175 146,220"/>
    <polygon points="1280,200 1300,148 1320,200"/>
    <polygon points="1310,200 1330,155 1350,200"/>
    <polygon points="300,240 316,200 332,240"/>
  </g>
</svg>

<div class="card">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <p class="subtitle">Arcane &mdash; Season 1</p>
  <div class="divider"></div>

  <blockquote>
    We are what they made us.<br>
    But tonight, I make<br>
    <span class="highlight">my own choice.</span>
  </blockquote>

  <div class="divider2"></div>
  <p class="attribution">Jinx (Powder)<br>Arcane</p>
</div>

<script>
  // Generate stars
  const container = document.getElementById('stars');
  for (let i = 0; i < 180; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      animation-delay:${(Math.random()*5).toFixed(1)}s;
    `;
    container.appendChild(s);
  }
</script>
</body>
</html>
